# factory-stream configuration
# Copy this to config.yaml and fill in your values

mqtt:
  host: localhost
  port: 1883
  username: ""
  password: ""
  topic_filter: "factory/+/+/+/telemetry"

influxdb:
  url: http://localhost:8086
  token: your-influxdb-token-here
  org: factory-stream
  bucket: ot-data
  batch_size: 100
  flush_interval_ms: 1000

timescaledb:
  host: localhost
  port: 5432
  database: factory_stream
  user: postgres
  password: postgres

api:
  host: 0.0.0.0
  port: 8000

anomaly:
  window: 60
  metrics:
    temperature:
      min: 0
      max: 200
      zscore_threshold: 3.0
    vibration:
      min: 0
      max: 5.0
      zscore_threshold: 3.5
    rpm:
      min: 0
      max: 10000
      zscore_threshold: 3.0
    pressure:
      min: 0
      max: 500
      zscore_threshold: 3.0
    power_kw:
      min: 0
      max: 100
      zscore_threshold: 3.0

logging:
  level: INFO
  format: "%(asctime)s %(levelname)s %(name)s: %(message)s"
